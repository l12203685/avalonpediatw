name: Deploy Frontend to Vercel

on:
  push:
    branches: [main]

# Backend (Socket.IO server) deploys automatically via Render's GitHub integration
# Configure at: https://dashboard.render.com → New Web Service → Connect repo

jobs:
  deploy-frontend:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package first
        run: pnpm --filter @avalon/shared build

      - name: Build frontend
        run: pnpm --filter @avalon/web build
        env:
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Remove broken env vars from Vercel project
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          TOKEN="${{ secrets.VERCEL_TOKEN }}"
          # Use Vercel CLI to remove each VITE_ env var that may reference a missing secret
          for VAR in VITE_FIREBASE_API_KEY VITE_FIREBASE_AUTH_DOMAIN VITE_FIREBASE_PROJECT_ID \
                     VITE_FIREBASE_STORAGE_BUCKET VITE_FIREBASE_MESSAGING_SENDER_ID \
                     VITE_FIREBASE_APP_ID VITE_FIREBASE_MEASUREMENT_ID VITE_SERVER_URL; do
            echo "Removing $VAR from Vercel project (if exists)..."
            vercel env rm "$VAR" production --token "$TOKEN" --yes 2>/dev/null || true
            vercel env rm "$VAR" preview --token "$TOKEN" --yes 2>/dev/null || true
            vercel env rm "$VAR" development --token "$TOKEN" --yes 2>/dev/null || true
          done
          echo "Env var cleanup complete"

      - name: Deploy to Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel deploy packages/web/dist --prod \
            --token ${{ secrets.VERCEL_TOKEN }} \
            --yes
