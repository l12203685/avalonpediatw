name: Deploy Frontend to Vercel

on:
  push:
    branches: [main]

# Backend (Socket.IO server) deploys automatically via Render's GitHub integration
# Configure at: https://dashboard.render.com → New Web Service → Connect repo

jobs:
  deploy-frontend:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package first
        run: pnpm --filter @avalon/shared build

      - name: Build frontend
        run: pnpm --filter @avalon/web build
        env:
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Fix Vercel project env vars (remove secret references)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          # Get all env var IDs that reference Vercel Secrets (type=secret)
          curl -sf "https://api.vercel.com/v9/projects/${VERCEL_PROJECT_ID}/env" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -o /tmp/vercel_envs.json

          # Extract and delete secret-type env vars
          python3 - <<'EOF'
          import json, subprocess, os

          with open('/tmp/vercel_envs.json') as f:
              data = json.load(f)

          token = os.environ['VERCEL_TOKEN']
          project_id = os.environ['VERCEL_PROJECT_ID']

          for env in data.get('envs', []):
              if env.get('type') == 'secret':
                  print(f"Deleting broken secret-ref: {env['key']} (id: {env['id']})")
                  result = subprocess.run([
                      'curl', '-sf', '-X', 'DELETE',
                      f'https://api.vercel.com/v9/projects/{project_id}/env/{env["id"]}',
                      '-H', f'Authorization: Bearer {token}'
                  ], capture_output=True)
                  print('OK' if result.returncode == 0 else 'Failed')
          EOF

      - name: Deploy to Vercel
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel deploy packages/web/dist --prod \
            --token ${{ secrets.VERCEL_TOKEN }} \
            --yes
