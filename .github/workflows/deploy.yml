name: Deploy Frontend to GitHub Pages

# DISABLED 2026-04-21: 固定用 avalon-game-platform.web.app 當玩家唯一入口
# 玩家已遷到 Firebase Hosting（deploy-firebase.yml），此 workflow 僅保留手動觸發
# GitHub Pages 部署已停用，如要恢復需把下方 VITE_SERVER_URL 改用 secrets
#
# 2026-04-26: hard-coded VITE_SERVER_URL replaced with Cloud Run URL
# (previous onrender.com value was stale — Render service deleted 2026-04-23).
# Long-term: switch to ${{ secrets.VITE_SERVER_URL }} like deploy-firebase.yml so
# alias migrations don't require workflow edits (see tree_registry/architecture/url_aliasing.md).
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @avalon/shared build

      - name: Run tests
        run: pnpm --filter @avalon/web test
        continue-on-error: true

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @avalon/shared build

      - name: Build frontend
        run: pnpm --filter @avalon/web build
        env:
          VITE_SERVER_URL: https://avalon-server-169653523467.asia-east1.run.app
          VITE_BASE: /avalonpediatw/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: packages/web/dist
