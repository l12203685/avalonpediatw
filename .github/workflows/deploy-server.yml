name: Deploy Server to Render (DEPRECATED 2026-04-23)

# DEPRECATED 2026-04-23: Render service deleted (see
# digital-immortal-tree-lyh/agent/tree_registry/architecture/render_deprecation.md).
# Backend now lives on Google Cloud Run (asia-east1). Triggers stripped to
# workflow_dispatch only so a stray push can't fire a 404 deploy hook.
# Kept for git history; do NOT use. Cloud Run deploy lives in
# the operator's gcloud workflow + future GH Action (TBD).
on:
  workflow_dispatch:

jobs:
  test:
    name: Test Server
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @avalon/shared build

      - name: Run server tests
        run: pnpm --filter @avalon/server test
        env:
          # Quarantine the 6P full-game integration flake (since 2026-04-20 commit 8335841c).
          # Mirrors test.yml — without this flag every push to main fails the
          # Render deploy on a known timeout, blocking the deploy hook.
          AVALON_QUARANTINE_6P: '1'

  verify-secrets:
    name: Verify Render & Bot Secrets
    runs-on: ubuntu-latest

    steps:
      - name: Check required secrets
        run: |
          MISSING=0

          check_secret() {
            if [ -z "$1" ]; then
              echo "⚠️  WARNING: $2 is not set in GitHub Secrets"
              MISSING=$((MISSING + 1))
            else
              echo "✅ $2 is set"
            fi
          }

          check_secret "$RENDER_DEPLOY_HOOK_URL"         "RENDER_DEPLOY_HOOK_URL"
          check_secret "$LINE_BOT_CHANNEL_ACCESS_TOKEN"  "LINE_BOT_CHANNEL_ACCESS_TOKEN"
          check_secret "$LINE_BOT_CHANNEL_SECRET"        "LINE_BOT_CHANNEL_SECRET"
          check_secret "$LINE_NOTIFY_CLIENT_ID"          "LINE_NOTIFY_CLIENT_ID"
          check_secret "$LINE_NOTIFY_CLIENT_SECRET"      "LINE_NOTIFY_CLIENT_SECRET"
          check_secret "$DISCORD_BOT_TOKEN"              "DISCORD_BOT_TOKEN"

          if [ $MISSING -gt 0 ]; then
            echo ""
            echo "Set missing secrets at:"
            echo "  https://github.com/l12203685/avalonpediatw/settings/secrets/actions"
            exit 1
          fi
        env:
          RENDER_DEPLOY_HOOK_URL:         ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          LINE_BOT_CHANNEL_ACCESS_TOKEN:  ${{ secrets.LINE_BOT_CHANNEL_ACCESS_TOKEN }}
          LINE_BOT_CHANNEL_SECRET:        ${{ secrets.LINE_BOT_CHANNEL_SECRET }}
          LINE_NOTIFY_CLIENT_ID:          ${{ secrets.LINE_NOTIFY_CLIENT_ID }}
          LINE_NOTIFY_CLIENT_SECRET:      ${{ secrets.LINE_NOTIFY_CLIENT_SECRET }}
          DISCORD_BOT_TOKEN:              ${{ secrets.DISCORD_BOT_TOKEN }}

  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    needs: [test, verify-secrets]

    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render deploy hook
        run: |
          echo "Triggering Render deployment..."
          curl -s --fail \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -X POST \
            --retry 3 \
            --retry-delay 5
          echo "Render deployment triggered successfully"
        # RENDER_DEPLOY_HOOK_URL:
        #   Render Dashboard → Service → Settings → Deploy Hook
        #   Copy the URL and save it as a GitHub Secret named RENDER_DEPLOY_HOOK_URL
        #   Format: https://api.render.com/deploy/srv-xxxxxxxxxxxxxxx?key=xxxxxxx
