name: Deploy to Firebase

on:
  push:
    branches: [main, claude/avalon-game-platform-*]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v3
        with:
          version: 8

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Deploy to Firebase
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_AVALON }}" > firebase-key.json
          npx firebase-tools deploy \
            --project avalon-game-platform \
            --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: firebase-key.json
