name: Deploy to Firebase

on:
  push:
    branches: [main, claude/avalon-game-platform-*]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        run: npm install -g pnpm@latest

      - name: Install and build all packages
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Deploy to Firebase
        run: |
          npm install -g firebase-tools
          firebase deploy --project avalon-game-platform --non-interactive
        env:
          FIREBASE_CREDENTIAL: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AVALON }}
