name: Deploy to Firebase

on:
  push:
    branches: [main, claude/avalon-game-platform-*]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd packages/web
          npm install
          npm run build

      - name: Build backend
        run: |
          cd packages/server
          npm install
          npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_AVALON }}
          channelId: live
          projectId: avalon-game-platform
