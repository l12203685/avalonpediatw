name: Deploy Wiki to Cloudflare Pages

# Serves the same React wiki (packages/web) that Firebase hosts, at the root
# path. GitHub Pages deploy (deploy.yml) is independent and builds with a
# subpath base.
on:
  push:
    branches: [main]
    paths:
      - 'packages/web/**'
      - 'packages/shared/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-cloudflare-pages.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/web/**'
      - 'packages/shared/**'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write   # needed for PR preview URL comment

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @avalon/shared build

      - name: Build frontend (root base)
        run: pnpm --filter @avalon/web build
        env:
          VITE_SERVER_URL: https://avalonpediatw.onrender.com
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Install Wrangler v3
        run: npm install -g wrangler@3

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages deploy packages/web/dist --project-name=avalonpediatw --branch=${{ github.head_ref || github.ref_name }} --commit-dirty=true
