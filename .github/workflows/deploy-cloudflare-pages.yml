name: Deploy Wiki to Cloudflare Pages

# 2026-04-26: 後端走本機 WSL2 + cloudflared quick tunnel（已棄用 ngrok）；此 workflow 讀 secrets.VITE_SERVER_URL
# 玩家主入口仍為 avalon-game-platform.web.app（Firebase Hosting），CF Pages 為備援
# 觸發：手動 dispatch 或 main 分支 push（限 packages/** + workflow 本身）
on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - '.github/workflows/deploy-cloudflare-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write   # needed for PR preview URL comment

jobs:
  deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @avalon/shared build

      - name: Build frontend (root base)
        run: pnpm --filter @avalon/web build
        env:
          VITE_SERVER_URL: ${{ secrets.VITE_SERVER_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Install Wrangler v3
        run: npm install -g wrangler@3

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # --commit-message forced to ASCII because CF Pages API rejects non-UTF-8 commit messages (code 8000111)
        run: |
          wrangler pages deploy packages/web/dist \
            --project-name=avalonpediatw \
            --branch=${{ github.head_ref || github.ref_name }} \
            --commit-dirty=true \
            --commit-hash=${{ github.sha }} \
            --commit-message="ci deploy ${{ github.sha }}"
