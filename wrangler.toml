# Cloudflare Pages project config — avalonpediatw.com
# Created for M0.4 (2026-04-14). Do not run `wrangler deploy` until Edward
# has created the Cloudflare account + linked API token (see docs/DEPLOY_CLOUDFLARE.md).
#
# Rationale: Pages projects can be configured either via the CF dashboard OR
# via a checked-in wrangler.toml. Keeping it here makes infra reproducible
# and reviewable in git.

name = "avalonpediatw"
compatibility_date = "2026-04-14"
pages_build_output_dir = "packages/web/dist"

# M0.5 R2 binding — GATED on M0.4 CF account creation (due 2026-04-20).
# After account exists:
#   1. Create bucket: wrangler r2 bucket create avalonpediatw-media
#   2. Set VITE_R2_PUBLIC_BASE as a CF Pages env var (the pub-*.r2.dev URL)
#   3. Run: python scripts/upload_videos_r2.py --bucket avalonpediatw-media
#   4. Uncomment the binding below so Pages Functions can access the bucket.
# See docs/M0.5_r2_spike.md §9 for full checklist.
#
# [[r2_buckets]]
# binding = "MEDIA"
# bucket_name = "avalonpediatw-media"

# Production branch (CF Pages calls this the "production branch").
# All pushes to main auto-deploy to avalonpediatw.com; all other branches
# get preview deployments at <hash>.avalonpediatw.pages.dev.
[env.production]
name = "avalonpediatw"

# NOTE on output dir:
# - CF Pages now serves the same React game frontend as Firebase hosting.
# - Both Firebase and CF Pages deploy from `packages/web/dist`.
# - The Astro wiki (apps/wiki/) is deferred to a future milestone.
