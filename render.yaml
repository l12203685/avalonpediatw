services:
  # ── Backend (Socket.IO server) ────────────────────────────────────────────
  - type: web
    name: avalonpediatw
    runtime: docker
    region: singapore
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # ── Bot secrets (set via Render dashboard or env group) ───────────────
      - key: LINE_BOT_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_BOT_CHANNEL_SECRET
        sync: false
      - key: LINE_NOTIFY_CLIENT_ID
        sync: false
      - key: LINE_NOTIFY_CLIENT_SECRET
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      # ── Firebase backend secrets ───────────────────────────────────────────
      - key: FIREBASE_DATABASE_URL
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      # ── CORS configuration ─────────────────────────────────────────────────
      - key: CORS_ORIGIN
        sync: false

  # ── Frontend (React static site) ─────────────────────────────────────────
  - type: web
    name: avalonpediatw-web
    runtime: static
    buildCommand: npm install -g pnpm@8 && pnpm install --frozen-lockfile && pnpm --filter @avalon/shared build && pnpm --filter @avalon/web build
    staticPublishPath: packages/web/dist
    envVars:
      - key: VITE_SERVER_URL
        value: https://avalonpediatw.onrender.com
      # ── Firebase client secrets (consumed by Vite build) ────────────────────
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_FIREBASE_DATABASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
