services:
  # ── Backend (Socket.IO server) ────────────────────────────────────────────
  - type: web
    name: avalonpediatw
    runtime: docker
    region: singapore
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

  # ── Frontend (React static site) ─────────────────────────────────────────
  - type: web
    name: avalonpediatw-web
    runtime: static
    region: singapore
    plan: free
    buildCommand: npm install -g pnpm@8 && pnpm install --frozen-lockfile && pnpm --filter @avalon/shared build && pnpm --filter @avalon/web build
    staticPublishPath: packages/web/dist
    envVars:
      - key: VITE_SERVER_URL
        value: https://avalonpediatw.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
