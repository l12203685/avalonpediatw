services:
  # ── Backend (Socket.IO server) ────────────────────────────────────────────
  - type: web
    name: avalonpediatw
    runtime: docker
    region: singapore
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # ── Supabase (set via Render dashboard) ──────────────────────────────
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      # ── Bot secrets (set via Render dashboard or env group) ───────────────
      - key: LINE_BOT_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_BOT_CHANNEL_SECRET
        sync: false
      - key: LINE_NOTIFY_CLIENT_ID
        sync: false
      - key: LINE_NOTIFY_CLIENT_SECRET
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_WEBHOOK_URL
        value: https://discord.com/api/webhooks/1138802075753521153/fTxo8tJMVP8ee-g-HAYHNOn7EsaFbFozPnfDhDL8KpI1FV7sr-OF5UdX-nmbJiEykWrj

  # ── Frontend (React static site) ─────────────────────────────────────────
  - type: web
    name: avalonpediatw-web
    runtime: static
    buildCommand: npm install -g pnpm@8 && pnpm install --frozen-lockfile && pnpm --filter @avalon/shared build && pnpm --filter @avalon/web build
    staticPublishPath: packages/web/dist
    envVars:
      - key: VITE_SERVER_URL
        value: https://avalonpediatw.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
